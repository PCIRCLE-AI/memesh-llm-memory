    <line x1="85" y1="78" x2="62" y2="95"/>
    <line x1="42" y1="28" x2="60" y2="55"/>
    <line x1="75" y1="30" x2="60" y2="55"/>
    <line x1="28" y1="55" x2="60" y2="55"/>
