[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memesh"
version = "3.0.0b1"
description = "MeMesh Python SDK — The lightest universal AI memory layer"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["httpx>=0.25.0"]
authors = [{name = "PCIRCLE AI"}]
keywords = ["ai", "memory", "llm", "knowledge-graph", "mcp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/PCIRCLE-AI/memesh-llm-memory"
Documentation = "https://github.com/PCIRCLE-AI/memesh-llm-memory"
Repository = "https://github.com/PCIRCLE-AI/memesh-llm-memory"

[tool.setuptools.packages.find]
where = ["src"]
